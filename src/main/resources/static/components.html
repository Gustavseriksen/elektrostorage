<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Komponenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ElektroStorage</a>

    <div class="container mt-4 mb-5">
        <h1>Komponenter</h1>

        <div id="component-list" class="my-4"></div>

        <div class="card">
            <div class="card-body">
                <h2 class="h5">Tilføj komponent</h2>
                <form id="create-form" class="row g-2">
                    <div class="col-md-4"><input type="number" id="internNummer" class="form-control" placeholder="Internt nummer" min="1" step="1" required></div>
                    <div class="col-md-4"><input type="text" id="eksterntVarenummer" class="form-control" placeholder="Eksternt varenummer" required></div>
                    <div class="col-md-4"><button type="submit" class="btn btn-primary w-100">Tilføj</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="components.js"></script>

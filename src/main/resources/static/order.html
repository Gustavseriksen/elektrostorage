<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Bestilling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ElektroStorage</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="components.html">Komponenter</a></li>
                <li class="nav-item"><a class="nav-link" href="orders.html">Bestillinger</a></li>
                <li class="nav-item"><a class="nav-link" href="inventory.html">Inventar</a></li>
                <li class="nav-item"><a class="nav-link" href="assemblies.html">Styklister</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 id="ordre-titel">Bestilling</h1>
        <p id="ordre-info" class="text-muted"></p>

        <h2 class="h4 mt-4">Komponenter på denne bestilling</h2>
        <ul id="line-list" class="list-group my-3"></ul>

        <div id="tilfoej-sektion" class="card mb-3">
            <div class="card-body">
                <h2 class="h5">Tilføj komponent</h2>
                <div class="row g-2">
                    <div class="col-md-6"><select id="component-select" class="form-select"></select></div>
                    <div class="col-md-3"><input type="number" id="antal" class="form-control" placeholder="Antal" min="1" required></div>
                    <div class="col-md-3"><button onclick="addLine()" class="btn btn-primary w-100">Tilføj</button></div>
                </div>
            </div>
        </div>

        <button id="send-knap" onclick="markerSendt()" class="btn btn-success">Marker som sendt</button>
        <button id="modtag-knap" onclick="markerModtaget()" class="btn btn-primary" style="display:none">Marker som modtaget</button>
    </div>

    <script src="order.js"></script>
</body>
</html>

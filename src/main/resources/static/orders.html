<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Bestillinger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ElektroStorage</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="components.html">Komponenter</a></li>
                <li class="nav-item"><a class="nav-link" href="orders.html">Bestillinger</a></li>
                <li class="nav-item"><a class="nav-link" href="inventory.html">Inventar</a></li>
                <li class="nav-item"><a class="nav-link" href="assemblies.html">Styklister</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Bestillinger</h1>

        <div class="card my-4">
            <div class="card-body">
                <h2 class="h5">Opret ny bestilling</h2>
                <form id="create-form" class="row g-2">
                    <div class="col-md-5">
                        <select id="supplier-select" class="form-select" required>
                            <option value="">Vælg leverandør...</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="trackingKode" class="form-control" placeholder="Tracking-kode (valgfri)">
                    </div>
                    <div class="col-md-2">
                        <input type="date" id="forventetLeveringsDato" class="form-control" title="Forventet leveringsdato">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Opret</button>
                    </div>
                </form>
            </div>
        </div>

        <h2 class="h4">Aktive bestillinger</h2>
        <ul id="order-list" class="list-group my-3"></ul>
    </div>

    <script src="orders.js"></script>
</body>
</html>
